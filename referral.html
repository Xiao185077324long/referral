<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推广绑定</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .wallet-btn {
            width: 100%;
            padding: 15px;
            background: #f0b90b;
            border: none;
            border-radius: 10px;
            color: #000;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .wallet-btn:hover {
            background: #d4a20a;
            transform: translateY(-2px);
        }
        .wallet-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .info-box {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .info-box label {
            color: #aaa;
            font-size: 12px;
            display: block;
            margin-bottom: 5px;
        }
        .info-box .value {
            color: #f0b90b;
            font-size: 14px;
            word-break: break-all;
        }
        .copy-btn {
            background: #2d5a3d;
            color: #fff;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 5px;
        }
        .copy-btn:hover {
            background: #3d7a5d;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            color: #fff;
            font-size: 14px;
            display: block;
            margin-bottom: 8px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
        }
        .input-group input:focus {
            outline: none;
            border-color: #f0b90b;
        }
        .bind-btn {
            width: 100%;
            padding: 15px;
            background: #2d5a3d;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .bind-btn:hover {
            background: #3d7a5d;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        .message.success {
            background: rgba(45, 90, 61, 0.8);
            color: #4ade80;
            display: block;
        }
        .message.error {
            background: rgba(180, 60, 60, 0.8);
            color: #f87171;
            display: block;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        .stat-box {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        .stat-box .label {
            color: #aaa;
            font-size: 11px;
            margin-bottom: 5px;
        }
        .stat-box .value {
            color: #f0b90b;
            font-size: 16px;
            font-weight: bold;
        }
        .referral-link-box {
            background: rgba(240, 185, 11, 0.1);
            border: 1px dashed #f0b90b;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }
        .referral-link-box .label {
            color: #f0b90b;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .referral-link-box .link {
            color: #fff;
            font-size: 12px;
            word-break: break-all;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>推广绑定系统</h1>
        
        <button class="wallet-btn" id="connectBtn" onclick="connectWallet()">
            连接钱包
        </button>
        
        <div id="walletInfo" style="display:none;">
            <div class="info-box">
                <label>当前钱包</label>
                <span class="value" id="walletAddress"></span>
            </div>
            
            <div class="referral-link-box">
                <div class="label">您的推广链接</div>
                <div class="link" id="referralLink"></div>
                <button class="copy-btn" onclick="copyReferralLink()">复制链接</button>
            </div>
            
            <div class="stats">
                <div class="stat-box">
                    <div class="label">绑定下级数量</div>
                    <div class="value" id="referralCount">0</div>
                </div>
                <div class="stat-box">
                    <div class="label">累计推广奖励</div>
                    <div class="value" id="totalReward">0</div>
                </div>
            </div>
        </div>
        
        <div class="input-group" style="margin-top: 30px;">
            <label>绑定下级（输入下级钱包地址）</label>
            <input type="text" id="bindAddress" placeholder="0x...">
        </div>
        
        <button class="bind-btn" id="bindBtn" onclick="bindReferrer()" disabled>
            绑定推荐关系
        </button>
        
        <div class="message" id="message"></div>
    </div>
    
    <script>
        // 配置 - 请修改为你的代币地址
        const TOKEN_ADDRESS = "0xa61c5419d661b1396c95c91b41c89eeff5f79c68";
        const RPC_URL = "https://bsc-dataseed.binance.org/";
        
        let web3;
        let account;
        let contract;
        
        // 合约 ABI - 只包含需要的方法
        const abi = [
            {
                "inputs": [{"internalType": "address","name": "refAddr","type": "address"}],
                "name": "bindReferrer",
                "outputs": [],
                "stateMutability": "nonpayable",
                "type": "function"
            },
            {
                "inputs": [{"internalType": "address","name": "","type": "address"}],
                "name": "referrer",
                "outputs": [{"internalType": "address","name": "","type": "address"}],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "getMyReferralsCount",
                "outputs": [{"internalType": "uint256","name": "","type": "uint256"}],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "getClaimableReferralsCount",
                "outputs": [{"internalType": "uint256","name": "count","type": "uint256"}],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "getMyReferralList",
                "outputs": [{"internalType": "address[]","name": "","type": "address[]"}],
                "stateMutability": "view",
                "type": "function"
            }
        ];
        
        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    account = accounts[0];
                    web3 = new Web3(window.ethereum);
                    contract = new web3.eth.Contract(abi, TOKEN_ADDRESS);
                    
                    document.getElementById('connectBtn').textContent = '已连接';
                    document.getElementById('connectBtn').disabled = true;
                    document.getElementById('walletInfo').style.display = 'block';
                    document.getElementById('walletAddress').textContent = account;
                    document.getElementById('bindBtn').disabled = false;
                    
                    // 生成推广链接
                    const baseUrl = window.location.origin + window.location.pathname;
                    document.getElementById('referralLink').textContent = baseUrl + '?ref=' + account;
                    
                    // 获取下级数量
                    try {
                        const count = await contract.methods.getMyReferralsCount().call();
                        document.getElementById('referralCount').textContent = count;
                    } catch (e) {
                        document.getElementById('referralCount').textContent = 'N/A';
                    }
                    
                    // 检查是否被推荐过
                    const myReferrer = await contract.methods.referrer(account).call();
                    if (myReferrer && myReferrer !== '0x0000000000000000000000000000000000000000') {
                        showMessage('您已被推荐，推荐人: ' + myReferrer, 'success');
                    }
                    
                    // 如果有待绑定的推荐人，自动绑定
                    if (pendingRef && pendingRef.toLowerCase() !== account.toLowerCase()) {
                        // 检查是否已经绑定过
                        if (!myReferrer || myReferrer === '0x0000000000000000000000000000000000000000') {
                            showMessage('正在自动绑定推荐人...', 'success');
                            setTimeout(() => {
                                bindReferrerByAddress(pendingRef);
                            }, 1000);
                        }
                    }
                    
                } catch (error) {
                    showMessage('连接失败: ' + error.message, 'error');
                }
            } else {
                showMessage('请安装 MetaMask 或 TokenPocket 等钱包', 'error');
            }
        }
        
        async function bindReferrer() {
            const referrerAddress = document.getElementById('bindAddress').value.trim();
            await bindReferrerByAddress(referrerAddress);
        }
        
        async function bindReferrerByAddress(referrerAddress) {
            if (!web3.utils.isAddress(referrerAddress)) {
                showMessage('推荐人地址无效', 'error');
                return;
            }
            
            if (referrerAddress.toLowerCase() === account.toLowerCase()) {
                showMessage('不能绑定自己为推荐人', 'error');
                return;
            }
            
            try {
                showMessage('正在绑定...', 'success');
                
                await contract.methods.bindReferrer(referrerAddress).send({
                    from: account,
                    gas: 100000
                });
                
                showMessage('绑定成功！推荐人: ' + referrerAddress, 'success');
                
            } catch (error) {
                if (error.message.includes('Already bound') || error.code === -32603) {
                    showMessage('已经绑定过推荐人，无需重复绑定', 'success');
                } else if (error.message.includes('Invalid referrer')) {
                    showMessage('推荐人地址无效', 'error');
                } else {
                    showMessage('绑定失败: ' + error.message, 'error');
                }
            }
        }
        
        function copyReferralLink() {
            const link = document.getElementById('referralLink').textContent;
            navigator.clipboard.writeText(link).then(() => {
                showMessage('推广链接已复制！', 'success');
            });
        }
        
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
        }
        
        // 全局变量存储推荐人地址
        let pendingRef = null;
        
        // 页面加载时检查 URL 参数
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('ref');
            if (ref && web3.utils.isAddress(ref)) {
                pendingRef = ref;
                document.getElementById('bindAddress').value = ref;
                showMessage('检测到推荐人，正在连接钱包...', 'success');
                // 自动连接钱包
                setTimeout(connectWallet, 500);
            }
        };
    </script>
</body>
</html>

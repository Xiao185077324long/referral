<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推广关系管理</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 头部 */
        .header {
            text-align: center;
            padding: 30px 0;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header p {
            color: #8892b0;
            font-size: 14px;
        }
        
        /* 连接钱包 */
        .wallet-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        
        .wallet-btn {
            padding: 16px 48px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .wallet-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .wallet-info {
            display: none;
        }
        
        .wallet-address {
            font-family: monospace;
            font-size: 16px;
            color: #64ffda;
            word-break: break-all;
            padding: 12px;
            background: rgba(100, 255, 218, 0.1);
            border-radius: 8px;
            margin-top: 12px;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #64ffda;
            margin-bottom: 8px;
        }
        
        .stat-label {
            font-size: 12px;
            color: #8892b0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* 上下级关系区域 */
        .relations-section {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 24px;
        }
        
        @media (max-width: 768px) {
            .relations-section {
                grid-template-columns: 1fr;
            }
        }
        
        /* 上级卡片 */
        .parent-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .parent-info {
            background: rgba(100, 255, 218, 0.1);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid rgba(100, 255, 218, 0.3);
        }
        
        .parent-info.empty {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed rgba(255, 255, 255, 0.2);
            text-align: center;
            color: #8892b0;
        }
        
        .parent-address {
            font-family: monospace;
            font-size: 14px;
            color: #64ffda;
            word-break: break-all;
            margin-bottom: 8px;
        }
        
        .parent-balance {
            font-size: 12px;
            color: #8892b0;
        }
        
        /* 下级列表 */
        .children-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .children-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .children-count {
            background: #64ffda;
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .children-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .child-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }
        
        .child-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .child-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .child-address {
            font-family: monospace;
            font-size: 14px;
            color: #fff;
        }
        
        .child-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .status-qualified {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }
        
        .status-pending {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }
        
        .status-not-qualified {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }
        
        .child-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            font-size: 12px;
        }
        
        .detail-item {
            text-align: center;
        }
        
        .detail-label {
            color: #8892b0;
            margin-bottom: 4px;
        }
        
        .detail-value {
            color: #fff;
            font-weight: 600;
        }
        
        .detail-value.qualified {
            color: #4caf50;
        }
        
        .detail-value.not-qualified {
            color: #f44336;
        }
        
        /* 推广链接 */
        .referral-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .referral-box {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        
        .referral-input {
            flex: 1;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #64ffda;
            font-family: monospace;
            font-size: 14px;
        }
        
        .copy-btn {
            padding: 14px 28px;
            background: #00d9ff;
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .copy-btn:hover {
            background: #00b8d9;
        }
        
        /* 一键领取 */
        .claim-section {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.1) 0%, rgba(255, 165, 89, 0.1) 100%);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }
        
        .claim-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .claim-amount {
            font-size: 24px;
            color: #ff6b6b;
            font-weight: 700;
        }
        
        .claim-amount-label {
            font-size: 12px;
            color: #8892b0;
        }
        
        .claim-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, #ff6b6b 0%, #ffa500 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .claim-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }
        
        .claim-btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            text-transform: none;
            letter-spacing: normal;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #8892b0;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        /* 消息提示 */
        .message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            animation: slideDown 0.3s ease;
            max-width: 90%;
            text-align: center;
        }
        
        .message.success {
            background: rgba(76, 175, 80, 0.9);
            color: #fff;
        }
        
        .message.error {
            background: rgba(244, 67, 54, 0.9);
            color: #fff;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 隐藏 */
        .hidden {
            display: none !important;
        }
        
        /* 滚动条 */
        .children-list::-webkit-scrollbar {
            width: 6px;
        }
        
        .children-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
        }
        
        .children-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>👥 推广关系管理</h1>
            <p>查看您的上下级关系，管理推广团队</p>
        </div>
        
        <!-- 连接钱包 -->
        <div class="wallet-section" id="walletSection">
            <button id="connectBtn" class="wallet-btn" onclick="connectWallet()">
                🔗 连接钱包
            </button>
            <div class="wallet-info" id="walletInfo">
                <p style="color: #64ffda; margin-bottom: 8px;">✅ 已连接</p>
                <div id="walletAddress" class="wallet-address"></div>
            </div>
        </div>
        
        <!-- 统计 -->
        <div id="statsSection" class="hidden">
            <div class="stats-grid">
                <div class="stat-card">
                    <div id="totalChildren" class="stat-value">0</div>
                    <div class="stat-label">下级总数</div>
                </div>
                <div class="stat-card">
                    <div id="qualifiedChildren" class="stat-value">0</div>
                    <div class="stat-label">达标下级</div>
                </div>
                <div class="stat-card">
                    <div id="pendingChildren" class="stat-value">0</div>
                    <div class="stat-label">持仓中</div>
                </div>
                <div class="stat-card">
                    <div id="teamBalance" class="stat-value">0</div>
                    <div class="stat-label">团队总持仓</div>
                </div>
            </div>
        </div>
        
        <!-- 上下级关系 -->
        <div id="relationsSection" class="relations-section hidden">
            <!-- 我的上级 -->
            <div class="parent-card">
                <div class="section-title">👆 我的上级</div>
                <div id="parentInfo" class="parent-info empty">
                    <p>暂无上级</p>
                </div>
            </div>
            
            <!-- 我的下级 -->
            <div class="children-card">
                <div class="children-header">
                    <div class="section-title">👇 我的下级</div>
                    <span id="childrenCount" class="children-count">0人</span>
                </div>
                <div id="childrenList" class="children-list">
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>暂无下级</p>
                        <p style="font-size: 12px; margin-top: 8px;">分享您的推广链接邀请好友</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 一键领取奖励 -->
        <div id="claimSection" class="claim-section hidden">
            <div class="section-title">💰 推广奖励</div>
            <div class="claim-info">
                <div>
                    <div class="claim-amount-label">可领取奖励（预估）</div>
                    <div id="claimableAmount" class="claim-amount">0 代币</div>
                </div>
                <div style="text-align: right;">
                    <div class="claim-amount-label">可领取人数</div>
                    <div id="claimableCount2" style="font-size: 20px; color: #64ffda;">0 人</div>
                </div>
            </div>
            <button id="claimBtn" class="claim-btn" onclick="claimAllRewards()">
                🏆 一键领取所有奖励
            </button>
        </div>
        
        <!-- 推广链接 -->
        <div id="referralSection" class="referral-section hidden">
            <div class="section-title">📢 我的推广链接</div>
            <div class="referral-box">
                <input type="text" id="referralLink" class="referral-input" readonly>
                <button class="copy-btn" onclick="copyReferralLink()">复制链接</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 配置 ====================
        const CONFIG = {
            // 代币合约地址
            TOKEN_ADDRESS: "0xA61C5419D661B1396c95c91b41C89eeFf5f79c68",
            // BSC RPC
            BSC_RPC: "https://bsc-dataseed.binance.org/",
            // 代币小数位
            DECIMALS: 18
        };
        
        // ==================== 全局变量 ====================
        let web3;
        let account;
        let contract;
        
        // ==================== ABI ====================
        const TOKEN_ABI = [
            // 查看函数
            {
                "inputs": [{"internalType": "address", "name": "", "type": "address"}],
                "name": "referrer",
                "outputs": [{"internalType": "address", "name": "", "type": "address"}],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "getMyReferralsCount",
                "outputs": [{"internalType": "uint256", "name": "", "type": "uint256"}],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "getMyReferralList",
                "outputs": [{"internalType": "address[]", "name": "", "type": "address[]"}],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [{"internalType": "address", "name": "user", "type": "address"}],
                "name": "balanceOf",
                "outputs": [{"internalType": "uint256", "name": "", "type": "uint256"}],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [{"internalType": "address", "name": "user", "type": "address"}],
                "name": "getUserHoldInfo",
                "outputs": [
                    {"internalType": "uint256", "name": "currentThreshold", "type": "uint256"},
                    {"internalType": "uint256", "name": "startTime", "type": "uint256"},
                    {"internalType": "uint256", "name": "endTime", "type": "uint256"},
                    {"internalType": "bool", "name": "qualified", "type": "bool"},
                    {"internalType": "uint256", "name": "userBalance", "type": "uint256"}
                ],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [{"internalType": "address", "name": "user", "type": "address"}],
                "name": "userFirstBuyTime",
                "outputs": [{"internalType": "uint256", "name": "", "type": "uint256"}],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [{"internalType": "address", "name": "user", "type": "address"}],
                "name": "referrerBindTime",
                "outputs": [{"internalType": "uint256", "name": "", "type": "uint256"}],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "getClaimableReferralsCount",
                "outputs": [{"internalType": "uint256", "name": "count", "type": "uint256"}],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "claimAllReferralRewards",
                "outputs": [],
                "stateMutability": "nonpayable",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "getRewardPhase",
                "outputs": [{"internalType": "uint8", "name": "", "type": "uint8"}],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [{"internalType": "address", "name": "", "type": "address"}, {"internalType": "address", "name": "", "type": "address"}, {"internalType": "uint8", "name": "", "type": "uint8"}],
                "name": "rewardClaimed",
                "outputs": [{"internalType": "bool", "name": "", "type": "bool"}],
                "stateMutability": "view",
                "type": "function"
            }
        ];
        
        // ==================== 工具函数 ====================
        function formatAddress(address) {
            return address.slice(0, 6) + '...' + address.slice(-4);
        }
        
        function formatTokenAmount(amount) {
            const divisor = Math.pow(10, CONFIG.DECIMALS);
            const value = parseFloat(amount) / divisor;
            if (value >= 1000000) {
                return (value / 1000000).toFixed(2) + 'M';
            } else if (value >= 1000) {
                return (value / 1000).toFixed(2) + 'K';
            }
            return value.toFixed(2);
        }
        
        function formatTime(timestamp) {
            if (!timestamp || timestamp == 0) return '-';
            const date = new Date(timestamp * 1000);
            return date.toLocaleDateString('zh-CN') + ' ' + date.toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
        }
        
        function showMessage(text, type = 'success') {
            const oldMsg = document.querySelector('.message');
            if (oldMsg) oldMsg.remove();
            
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            document.body.appendChild(msg);
            
            setTimeout(() => msg.remove(), 3000);
        }
        
        // ==================== 连接钱包 ====================
        async function connectWallet() {
            const btn = document.getElementById('connectBtn');
            
            try {
                if (typeof window.ethereum === 'undefined') {
                    showMessage('请安装 MetaMask 或 TokenPocket 钱包', 'error');
                    return;
                }
                
                btn.innerHTML = '<span class="loading"></span>连接中...';
                
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                account = accounts[0];
                web3 = new Web3(window.ethereum);
                contract = new web3.eth.Contract(TOKEN_ABI, CONFIG.TOKEN_ADDRESS);
                
                // 更新UI
                document.getElementById('connectBtn').classList.add('hidden');
                document.getElementById('walletInfo').style.display = 'block';
                document.getElementById('walletAddress').textContent = account;
                
                // 显示功能区域
                document.getElementById('statsSection').classList.remove('hidden');
                document.getElementById('relationsSection').classList.remove('hidden');
                document.getElementById('claimSection').classList.remove('hidden');
                document.getElementById('referralSection').classList.remove('hidden');
                
                // 生成推广链接
                const baseUrl = window.location.origin + window.location.pathname.replace('referral-dashboard.html', 'referral-new.html');
                document.getElementById('referralLink').value = `${baseUrl}?ref=${account}`;
                
                // 加载数据
                await loadRelations();
                await loadClaimableInfo();
                
                showMessage('钱包连接成功！');
                
            } catch (error) {
                console.error('连接失败:', error);
                showMessage('连接失败: ' + error.message, 'error');
                btn.innerHTML = '🔗 连接钱包';
            }
        }
        
        // ==================== 加载上下级关系 ====================
        async function loadRelations() {
            try {
                // 加载上级
                await loadParent();
                
                // 加载下级
                await loadChildren();
                
            } catch (error) {
                console.error('加载关系失败:', error);
                showMessage('加载数据失败', 'error');
            }
        }
        
        // 加载上级
        async function loadParent() {
            try {
                const parent = await contract.methods.referrer(account).call();
                const parentInfo = document.getElementById('parentInfo');
                
                if (parent && parent !== '0x0000000000000000000000000000000000000000') {
                    // 获取上级持仓
                    const balance = await contract.methods.balanceOf(parent).call();
                    
                    parentInfo.classList.remove('empty');
                    parentInfo.innerHTML = `
                        <div class="parent-address">${formatAddress(parent)}</div>
                        <div class="parent-balance">持仓: ${formatTokenAmount(balance)} 代币</div>
                    `;
                } else {
                    parentInfo.classList.add('empty');
                    parentInfo.innerHTML = '<p>暂无上级<br><small style="color: #64ffda;">您可以通过推广链接绑定上级</small></p>';
                }
            } catch (error) {
                console.error('加载上级失败:', error);
            }
        }
        
        // 加载下级
        async function loadChildren() {
            try {
                const children = await contract.methods.getMyReferralList().call({ from: account });
                const count = children.length;
                
                document.getElementById('totalChildren').textContent = count;
                document.getElementById('childrenCount').textContent = count + '人';
                
                if (count === 0) {
                    document.getElementById('childrenList').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p>暂无下级</p>
                            <p style="font-size: 12px; margin-top: 8px;">分享您的推广链接邀请好友</p>
                        </div>
                    `;
                    document.getElementById('qualifiedChildren').textContent = '0';
                    document.getElementById('pendingChildren').textContent = '0';
                    document.getElementById('teamBalance').textContent = '0';
                    return;
                }
                
                // 获取每个下级的详细信息
                let qualifiedCount = 0;
                let pendingCount = 0;
                let teamTotalBalance = 0;
                let childrenHtml = '';
                
                for (let i = 0; i < children.length; i++) {
                    const child = children[i];
                    const holdInfo = await contract.methods.getUserHoldInfo(child).call();
                    const balance = holdInfo.userBalance;
                    const bindTime = await contract.methods.referrerBindTime(child).call();
                    
                    teamTotalBalance += parseFloat(balance);
                    
                    let statusClass = 'status-not-qualified';
                    let statusText = '未达标';
                    
                    if (holdInfo.qualified) {
                        statusClass = 'status-qualified';
                        statusText = '已达标';
                        qualifiedCount++;
                    } else if (holdInfo.currentThreshold > 0) {
                        statusClass = 'status-pending';
                        statusText = '持仓中';
                        pendingCount++;
                    }
                    
                    const remainingTime = holdInfo.endTime > 0 && !holdInfo.qualified 
                        ? Math.max(0, holdInfo.endTime - Math.floor(Date.now() / 1000)) 
                        : 0;
                    
                    childrenHtml += `
                        <div class="child-item">
                            <div class="child-header">
                                <span class="child-address">${formatAddress(child)}</span>
                                <span class="child-status ${statusClass}">${statusText}</span>
                            </div>
                            <div class="child-details">
                                <div class="detail-item">
                                    <div class="detail-label">当前持仓</div>
                                    <div class="detail-value">${formatTokenAmount(balance)}</div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label">目标门槛</div>
                                    <div class="detail-value ${holdInfo.userBalance >= holdInfo.currentThreshold ? 'qualified' : 'not-qualified'}">
                                        ${holdInfo.currentThreshold > 0 ? formatTokenAmount(holdInfo.currentThreshold) : '-'}
                                    </div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label">绑定时间</div>
                                    <div class="detail-value">${formatTime(bindTime)}</div>
                                </div>
                            </div>
                        </div>
                    `;
                }
                
                document.getElementById('childrenList').innerHTML = childrenHtml;
                document.getElementById('qualifiedChildren').textContent = qualifiedCount;
                document.getElementById('pendingChildren').textContent = pendingCount;
                document.getElementById('teamBalance').textContent = formatTokenAmount(teamTotalBalance.toString());
                
            } catch (error) {
                console.error('加载下级失败:', error);
            }
        }
        
        // ==================== 复制推广链接 ====================
        function copyReferralLink() {
            const input = document.getElementById('referralLink');
            input.select();
            document.execCommand('copy');
            showMessage('推广链接已复制！');
        }
        
        // ==================== 一键领取奖励 ====================
        async function claimAllRewards() {
            const btn = document.getElementById('claimBtn');
            
            try {
                // 检查是否有可领取的奖励
                const claimableCount = await contract.methods.getClaimableReferralsCount().call({ from: account });
                
                if (claimableCount == 0) {
                    showMessage('暂无可领取的奖励', 'error');
                    return;
                }
                
                btn.disabled = true;
                btn.innerHTML = '<span class="loading"></span>领取中...';
                
                // 调用合约一键领取
                await contract.methods.claimAllReferralRewards().send({ 
                    from: account,
                    gas: 500000
                });
                
                showMessage('🎉 奖励领取成功！已到账');
                
                // 刷新数据
                await loadRelations();
                await loadClaimableInfo();
                
            } catch (error) {
                console.error('领取失败:', error);
                if (error.message.includes('no claimable')) {
                    showMessage('暂无可领取的奖励', 'error');
                } else if (error.message.includes('User rejected')) {
                    showMessage('您取消了交易', 'error');
                } else {
                    showMessage('领取失败: ' + error.message, 'error');
                }
            }
            
            btn.innerHTML = '🏆 一键领取所有奖励';
            btn.disabled = false;
        }
        
        // 加载可领取奖励信息
        async function loadClaimableInfo() {
            try {
                const claimableCount = await contract.methods.getClaimableReferralsCount().call({ from: account });
                document.getElementById('claimableCount2').textContent = claimableCount + ' 人';
                
                // 获取当前阶段
                const phase = await contract.methods.getRewardPhase().call({ from: account });
                
                // 计算预估奖励
                const children = await contract.methods.getMyReferralList().call({ from: account });
                let totalReward = 0;
                
                for (let i = 0; i < children.length; i++) {
                    const child = children[i];
                    const holdInfo = await contract.methods.getUserHoldInfo(child).call();
                    
                    // 检查是否已领取
                    const claimed = await contract.methods.rewardClaimed(account, child, phase).call();
                    if (claimed) continue;
                    
                    // 检查是否达标
                    if (holdInfo.qualified && holdInfo.currentThreshold > 0) {
                        // 根据阶段计算奖励比例
                        let rewardPercent = 1; // 默认1%
                        if (phase == 2) rewardPercent = 3;
                        if (phase == 3) rewardPercent = 5;
                        
                        const reward = (BigInt(holdInfo.currentThreshold) * BigInt(rewardPercent)) / BigInt(100);
                        totalReward += Number(reward);
                    }
                }
                
                document.getElementById('claimableAmount').textContent = formatTokenAmount(totalReward.toString()) + ' 代币';
                
            } catch (error) {
                console.error('加载奖励信息失败:', error);
            }
        }
        
        // ==================== 监听钱包切换 ====================
        if (window.ethereum) {
            window.ethereum.on('accountsChanged', (accounts) => {
                if (accounts.length === 0) {
                    location.reload();
                } else if (accounts[0] !== account) {
                    location.reload();
                }
            });
        }
        
        // ==================== 页面加载 ====================
        window.addEventListener('DOMContentLoaded', () => {
            if (CONFIG.TOKEN_ADDRESS === "0x0000000000000000000000000000000000000000") {
                showMessage('请先配置代币合约地址', 'error');
            }
        });
    </script>
</body>
</html>

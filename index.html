<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小翼龙 Token</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐉</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
        }
        
        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 8px;
            object-fit: cover;
        }
        
        .header {
            text-align: center;
            padding: 60px 20px;
            background-image: url('150659f2ce7580b3be6b695195574c44_720.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        
        .header h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .header .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 13px;
        }
        
        .status-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
        }
        
        .status-dot.connected {
            background: #00d26a;
            box-shadow: 0 0 8px #00d26a;
        }
        
        .status-text {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }
        
        .wallet-section {
            text-align: center;
            padding: 60px 20px;
        }
        
        .connect-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            padding: 16px 40px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(102,126,234,0.4);
        }
        
        .hidden {
            display: none !important;
        }
        
        .card {
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .card-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: rgba(255,255,255,0.9);
        }
        
        .token-info {
            text-align: center;
        }
        
        .token-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .token-price {
            font-size: 28px;
            font-weight: 700;
            color: #00d26a;
            margin-bottom: 4px;
        }
        
        .token-change {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }
        
        .lock-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
        }
        
        .lock-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
            box-sizing: border-box;
        }
        
        .lock-card.private {
            border-left: 3px solid #00d26a;
        }
        
        .lock-card.project {
            border-left: 3px solid #ffc107;
        }
        
        .lock-label {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 6px;
        }
        
        .lock-value {
            font-size: 18px;
            font-weight: 700;
        }
        
        .lock-card.private .lock-value {
            color: #00d26a;
        }
        
        .lock-card.project .lock-value {
            color: #ffc107;
        }
        
        .progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        
        .progress-bar .fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.3s;
        }
        
        .progress-bar.green .fill {
            background: linear-gradient(90deg, #00d26a, #00ff88);
        }
        
        .progress-bar.yellow .fill {
            background: linear-gradient(90deg, #ffc107, #ffdd59);
        }
        
        .phase-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        
        .phase-item {
            text-align: center;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }
        
        .phase-item.active {
            background: rgba(102,126,234,0.3);
            border: 1px solid #667eea;
        }
        
        .phase-num {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .phase-item.active .phase-num {
            color: #667eea;
        }
        
        .phase-label {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }
        
        .user-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .user-item {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 12px;
        }
        
        .user-label {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 4px;
        }
        
        .user-value {
            font-size: 14px;
            font-weight: 600;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        
        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }
        
        .btn-green {
            background: linear-gradient(135deg, #00d26a, #00b85c);
            color: #fff;
        }
        
        .btn-yellow {
            background: linear-gradient(135deg, #ffc107, #e0a800);
            color: #1a1a2e;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .input-group {
            margin-bottom: 12px;
        }
        
        .input-label {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 6px;
            display: block;
        }
        
        .input-field {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        
        .input-field:focus {
            border-color: #667eea;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(0,0,0,0.9);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            transition: transform 0.3s;
            max-width: 90%;
            text-align: center;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .toast.success { border-left: 3px solid #00d26a; }
        .toast.error { border-left: 3px solid #ff4757; }
        
        .refresh-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(102,126,234,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .refresh-btn:hover {
            transform: scale(1.1);
        }
        
        .refresh-btn.spinning svg {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .error-box {
            background: rgba(255,71,87,0.15);
            border: 1px solid rgba(255,71,87,0.3);
            border-radius: 10px;
            padding: 10px;
            margin-top: 12px;
            font-size: 13px;
            color: #ff6b6b;
            display: none;
        }
        
        .error-box.show {
            display: block;
        }
        
        @media (min-width: 768px) {
            .container {
                padding: 24px;
            }
            
            .header h1 {
                font-size: 28px;
            }
            
            .lock-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .user-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .phase-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        .tab-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        
        .tab-btn {
            padding: 10px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            background: transparent;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .data-row:last-child {
            border-bottom: none;
        }
        
        .data-label {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }
        
        .data-value {
            font-size: 13px;
            font-weight: 500;
        }
        
        .phase-reward-card {
            background: linear-gradient(135deg, rgba(102,126,234,0.3), rgba(118,75,162,0.3));
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        
        .phase-reward-header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .phase-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .phase-reward-text {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }
        
        .phase-reward-value {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }
        
        .tier-table {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .tier-row {
            display: flex;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .tier-row:last-child {
            border-bottom: none;
        }
        
        .tier-header {
            background: rgba(102,126,234,0.2);
            font-weight: 600;
        }
        
        .tier-label, .tier-superior, .tier-subordinate {
            flex: 1;
            text-align: center;
        }
        
        .tier-label {
            font-weight: 600;
        }
        
        .downline-card {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .downline-address {
            font-family: monospace;
            font-size: 13px;
            color: #667eea;
        }
        
        .downline-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }
        
        .downline-badge.claimable {
            background: rgba(0,210,106,0.2);
            color: #00d26a;
        }
        
        .downline-badge.claimed {
            background: rgba(255,71,87,0.2);
            color: #ff4757;
        }
        
        .downline-badge.inactive {
            background: rgba(100,100,100,0.2);
            color: #888;
        }
        
        .log-item {
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .log-success { color: #00d26a; }
        .log-error { color: #ff6b6b; }
        .log-info { color: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
        </div>
        
        <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">未连接</span>
        </div>
        
        <div class="wallet-section" id="walletSection">
            <button class="connect-btn" onclick="connectWallet()">连接钱包</button>
        </div>
        
        <div id="mainContent" class="hidden">
            <div class="tab-nav">
                <button class="tab-btn active" onclick="switchTab('home')">首页</button>
                <button class="tab-btn" onclick="switchTab('lock')">锁仓数据</button>
                <button class="tab-btn" onclick="switchTab('referral')">推广</button>
                <button class="tab-btn" onclick="switchTab('info')">我的</button>
            </div>
            
            <div class="tab-content active" id="tab-home">
                <div class="card">
                    <div class="card-title">阶段进度</div>
                    <div class="phase-grid">
                        <div class="phase-item" id="phase1">
                            <div class="phase-num">阶段1</div>
                            <div class="phase-label">1% 奖励</div>
                        </div>
                        <div class="phase-item" id="phase2">
                            <div class="phase-num">阶段2</div>
                            <div class="phase-label">3% 奖励</div>
                        </div>
                        <div class="phase-item" id="phase3">
                            <div class="phase-num">阶段3</div>
                            <div class="phase-label">5% 奖励</div>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-title">当前活跃阶段奖励说明</div>
                    <div class="phase-reward-card">
                        <div class="tier-table">
                            <div class="tier-row tier-header">
                                <span class="tier-label">档位</span>
                                <span class="tier-superior">上级门槛</span>
                                <span class="tier-subordinate">下级门槛</span>
                            </div>
                            <div class="tier-row">
                                <span class="tier-label">一档</span>
                                <span class="tier-superior">300万</span>
                                <span class="tier-subordinate">50万</span>
                            </div>
                            <div class="tier-row">
                                <span class="tier-label">二档</span>
                                <span class="tier-superior">150万</span>
                                <span class="tier-subordinate">80万</span>
                            </div>
                            <div class="tier-row">
                                <span class="tier-label">三档</span>
                                <span class="tier-superior">80万</span>
                                <span class="tier-subordinate">10万</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-title">合约数据</div>
                    <div class="data-row">
                        <span class="data-label">销毁总量</span>
                        <span class="data-value" id="burnedAmount">--</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">流通供应</span>
                        <span class="data-value" id="circulating">--</span>
                    </div>
                </div>
            </div>
            
            <div class="tab-content" id="tab-lock">
                <div class="card">
                    <div class="card-title">锁仓数据</div>
                    <div class="lock-grid">
                        <div class="lock-card private">
                            <div class="lock-label">私募方锁仓总量</div>
                            <div class="lock-value" id="privateLockTotal">--</div>
                        </div>
                        
                        <div class="lock-card private">
                            <div class="lock-label">私募方释放总量</div>
                            <div class="lock-value" id="privateReleased">--</div>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-title">项目方数据</div>
                    <div class="lock-grid">
                        <div class="lock-card project">
                            <div class="lock-label">项目方锁仓总量</div>
                            <div class="lock-value" id="projectLockTotal">--</div>
                        </div>
                        
                        <div class="lock-card project">
                            <div class="lock-label">项目方释放总量</div>
                            <div class="lock-value" id="projectReleased">--</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="tab-content" id="tab-referral">
                <div class="card">
                    <div class="card-title">推广链接</div>
                    <div class="input-group">
                        <div style="display: flex; gap: 8px;">
                            <input type="text" class="input-field" id="referralLink" readonly placeholder="推广链接">
                            <button class="btn btn-primary" onclick="copyReferralLink()" style="width: auto; padding: 12px 16px;">复制</button>
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">绑定推荐人（输入推荐人地址）</label>
                        <div style="display: flex; gap: 8px;">
                            <input type="text" class="input-field" id="referrerInput" placeholder="输入推荐人地址">
                            <button class="btn btn-primary" onclick="bindReferrer()" style="width: auto; padding: 12px 16px;">绑定</button>
                        </div>
                    </div>
                    <div class="error-box" id="referralError"></div>
                </div>
                
                <div class="card">
                    <div class="card-title">推广奖励领取</div>
                    <div id="downlineList"></div>
                    
                    <div style="margin-top: 16px;">
                        <div class="btn-group">
                            <button class="btn btn-primary" onclick="refreshAllDownlines()">一键刷新</button>
                            <button class="btn btn-green" onclick="autoClaimAll()">一键领取</button>
                        </div>
                        <div style="margin-top: 8px; font-size: 12px; color: rgba(255,255,255,0.5);">
                            <span id="lastClaimTime">上次领取: --</span> | 
                            <span id="lastRefreshTime">上次刷新: --</span>
                        </div>
                    </div>
                    
                    <div id="claimLog" style="margin-top: 16px; display: none;">
                        <div class="card-title" style="font-size: 13px;">操作日志</div>
                        <div style="background: rgba(0,0,0,0.3); border-radius: 8px; padding: 12px; max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px;" id="logContent"></div>
                    </div>
                </div>
            </div>
            
            <div class="tab-content" id="tab-info">
                <div class="card">
                    <div class="card-title">我的钱包</div>
                    <div class="user-grid">
                        <div class="user-item">
                            <div class="user-label">代币余额</div>
                            <div class="user-value" id="userBalance">--</div>
                        </div>
                        <div class="user-item">
                            <div class="user-label">累计DEX买入</div>
                            <div class="user-value" id="dexBuy">--</div>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-title">持仓状态</div>
                    <div class="data-row">
                        <span class="data-label">当前持仓门槛</span>
                        <span class="data-value" id="holdThreshold">--</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">门槛开始时间</span>
                        <span class="data-value" id="holdStartTime">--</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">24小时解锁时间</span>
                        <span class="data-value" id="holdEndTime">--</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">用户阶段</span>
                        <span class="data-value" id="userPhase">--</span>
                    </div>
                </div>
                
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="disconnectWallet()">断开连接</button>
                </div>
            </div>
        </div>
    </div>
    
    <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 4v6h-6M1 20v-6h6"/>
            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
    </button>
    
    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <script>
        const CONFIG = {
            BSC_RPC: "https://bsc-dataseed.binance.org/",
            CHAIN_ID: 56,
            
            MAIN_CONTRACT: "0x0000000000000000000000000000000000000000",
            LOCK_CONTRACT: "0x0000000000000000000000000000000000000000",
            
            TOKEN_DECIMALS: 18
        };
        
        let web3;
        let account;
        let mainContract;
        let lockContract;
        let isLoading = false;
        
        const MAIN_ABI = [
            {"inputs":[],"name":"name","outputs":[{"type":"string"}],"stateMutability":"view","type":"function"},
            {"inputs":[],"name":"symbol","outputs":[{"type":"string"}],"stateMutability":"view","type":"function"},
            {"inputs":[],"name":"totalSupply","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},

        function formatToken(amount, decimals = CONFIG.TOKEN_DECIMALS) {
            if (!amount || amount === '0') return '0';
            const num = BigInt(amount);
            const divisor = BigInt(10 ** decimals);
            const whole = num / divisor;
            const remainder = num % divisor;
            const fraction = remainder.toString().padStart(decimals, '0').slice(0, 4);
            if (remainder === 0n) return whole.toLocaleString();
            return `${whole}.${fraction}`.replace(/\.?0+$/, '');
        }
        
        function formatDate(timestamp) {
            if (!timestamp || timestamp === '0') return '--';
            const date = new Date(Number(timestamp) * 1000);
            return date.toLocaleString('zh-CN', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'});
        }
        
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        function showError(msg, elementId = 'referralError') {
            const box = document.getElementById(elementId);
            box.textContent = msg;
            box.classList.add('show');
            setTimeout(() => box.classList.remove('show'), 5000);
        }
        
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-' + tabName).classList.add('active');
        }
        
        function getReferrerFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('ref');
        }
        
        function getEthereumProvider() {
            if (window.ethereum?.isMetaMask) return window.ethereum;
            if (window.ethereum) return window.ethereum;
            if (window.web3?.currentProvider) return window.web3.currentProvider;
            return null;
        }
        
        async function connectWallet() {
            const ethereum = getEthereumProvider();
            if (!ethereum) {
                showToast('请安装 MetaMask、TokenPocket 或其他 Web3 钱包', 'error');
                return;
            }
            
            try {
                let accounts;
                try {
                    accounts = await ethereum.request({ method: 'eth_requestAccounts' });
                } catch (e) {
                    if (ethereum.enable) accounts = await ethereum.enable();
                    else throw e;
                }
                
                if (!accounts || accounts.length === 0) throw new Error('未授权钱包');
                
                account = accounts[0];
                web3 = new Web3(ethereum);
                mainContract = new web3.eth.Contract(MAIN_ABI, CONFIG.MAIN_CONTRACT);
                
                try {
                    const chainId = await web3.eth.getChainId();
                    if (Number(chainId) !== CONFIG.CHAIN_ID) {
                        try {
                            await ethereum.request({
                                method: 'wallet_switchEthereumChain',
                                params: [{ chainId: `0x${CONFIG.CHAIN_ID.toString(16)}` }]
                            });
                        } catch (switchError) {
                            if (switchError.code !== 4902) throw switchError;
                            showToast('请手动切换到 BSC 主网', 'error');
                        }
                    }
                } catch (e) {
                    console.warn('检查网络失败:', e);
                }
                
                document.getElementById('walletSection').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                updateStatus('connected', account.slice(0,6) + '...' + account.slice(-4));
                
                const referralLink = `https://xiao185077324long.github.io/referral/?ref=${account}`;
                document.getElementById('referralLink').value = referralLink;
                
                const savedClaimTime = localStorage.getItem('xyl_last_claim');
                if (savedClaimTime) {
                    lastClaimTime = parseInt(savedClaimTime);
                    document.getElementById('lastClaimTime').textContent = `上次领取: ${new Date(lastClaimTime).toLocaleString('zh-CN')}`;
                }
                
                const savedRefreshTime = localStorage.getItem('xyl_last_refresh');
                if (savedRefreshTime) {
                    lastRefreshTime = parseInt(savedRefreshTime);
                    document.getElementById('lastRefreshTime').textContent = `上次刷新: ${new Date(lastRefreshTime).toLocaleString('zh-CN')}`;
                }
                
                await refreshData();
                
                const pendingRef = getReferrerFromURL();
                if (pendingRef && web3.utils.isAddress(pendingRef)) {
                    try {
                        const myReferrer = await mainContract.methods.referrer(account).call();
                        if (!myReferrer || myReferrer === '0x0000000000000000000000000000000000000000') {
                            if (pendingRef.toLowerCase() !== account.toLowerCase()) {
                                showToast('正在自动绑定推荐人...', 'success');
                                setTimeout(async () => {
                                    try {
                                        await mainContract.methods.bindReferrer(pendingRef).send({ from: account });
                                        showToast('推荐人绑定成功！', 'success');
                                    } catch (e) {
                                        console.log('自动绑定失败:', e);
                                    }
                                }, 500);
                            }
                        }
                    } catch (e) {
                        console.log('检查推荐人状态失败:', e);
                    }
                }
                
                ethereum.on('accountsChanged', (accounts) => {
                    if (!accounts || accounts.length === 0) disconnectWallet();
                    else { account = accounts[0]; refreshData(); }
                });
                
                ethereum.on('chainChanged', () => window.location.reload());
                
            } catch (error) {
                console.error('连接失败:', error);
                let msg = error.message || '连接失败';
                if (msg.includes('User rejected') || msg.includes('用户取消')) msg = '用户取消连接';
                showToast(msg, 'error');
            }
        }
        
        function disconnectWallet() {
            account = null;
            mainContract = null;
            document.getElementById('walletSection').classList.remove('hidden');
            document.getElementById('mainContent').classList.add('hidden');
            updateStatus('', '未连接');
        }
        
        function updateStatus(state, text) {
            document.getElementById('statusDot').className = 'status-dot ' + state;
            document.getElementById('statusText').textContent = text;
        }
        
        async function copyReferralLink() {
            const link = document.getElementById('referralLink').value;
            if (!link) {
                showToast('请先连接钱包', 'error');
                return;
            }
            
            try {
                await navigator.clipboard.writeText(link);
                showToast('复制成功！', 'success');
            } catch (e) {
                const textarea = document.createElement('textarea');
                textarea.value = link;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('复制成功！', 'success');
            }
        }
        
        async function bindReferrer() {
            const refAddr = document.getElementById('referrerInput').value.trim();
            if (!web3.utils.isAddress(refAddr)) {
                showError('请输入有效的钱包地址');
                return;
            }
            
            try {
                await mainContract.methods.bindReferrer(refAddr).send({ from: account });
                showToast('绑定成功！', 'success');
                refreshData();
            } catch (error) {
                console.error('绑定失败:', error);
                let msg = '绑定失败';
                if (error.message.includes('AlreadyBound')) msg = '您已经绑定过推荐人';
                else if (error.message.includes('InvalidReferrer')) msg = '不能绑定自己为推荐人';
                else if (error.message.includes('user rejected')) msg = '用户取消签名';
                showError(msg);
            }
        }
        
        async function refreshData() {
            if (!mainContract || isLoading) return;
            
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('spinning');
            isLoading = true;
            
            try {
                const name = await mainContract.methods.name().call();
                document.getElementById('tokenName').textContent = name;
                
                const activePhase = await mainContract.methods.getActivePhase().call();
                const phaseNum = Number(activePhase);
                document.getElementById('currentPhase').textContent = phaseNum === 0 ? '已结束' : `阶段${phaseNum}`;
                
                ['phase1', 'phase2', 'phase3'].forEach((id, i) => {
                    document.getElementById(id).classList.toggle('active', i + 1 === phaseNum);
                });
                
                const rewardRates = ['--', '1%', '3%', '5%'];
                const phaseTargets = [0, 400000000, 650000000, 800000000];
                
                const burned = await mainContract.methods.getBurnedAmount().call();
                const burnedNum = Number(burned);
                
                const circulating = await mainContract.methods.getCirculatingSupply().call();
                document.getElementById('burnedAmount').textContent = formatToken(burned);
                document.getElementById('circulating').textContent = formatToken(circulating);
                
                try {
                    const priceInfo = await mainContract.methods.getPriceInfo().call();
                    if (priceInfo[2] > 0) {
                        const priceBNB = Number(priceInfo[2]) / 1e18;
                        document.getElementById('tokenPrice').textContent = priceBNB.toFixed(8) + ' BNB';
                    }
                } catch (e) {}
                
                const balance = await mainContract.methods.balanceOf(account).call();
                document.getElementById('userBalance').textContent = formatToken(balance);
                
                const userReferrer = await mainContract.methods.referrer(account).call();
                document.getElementById('referrerStatus').textContent = 
                    userReferrer !== '0x0000000000000000000000000000000000000000' ? '已绑定' : '未绑定';
                
                const userPhase = await mainContract.methods.getUserPhase(account).call();
                document.getElementById('userPhase').textContent = 
                    Number(userPhase) === 0 ? '新用户' : `阶段${userPhase}`;
                
                const holdInfo = await mainContract.methods.getUserHoldInfo(account).call();
                document.getElementById('userThreshold').textContent = formatToken(holdInfo[0]);
                document.getElementById('holdThreshold').textContent = formatToken(holdInfo[0]);
                document.getElementById('holdStartTime').textContent = formatDate(holdInfo[1]);
                document.getElementById('holdEndTime').textContent = formatDate(holdInfo[2]);
                document.getElementById('holdQualified').textContent = holdInfo[3] ? '✅ 满足' : '❌ 不满足';
                document.getElementById('qualified').textContent = holdInfo[3] ? '✅' : '❌';
                
                const dexInfo = await mainContract.methods.getUserDEXBuyInfo(account).call();
                document.getElementById('dexBuy').textContent = formatToken(dexInfo[0]);
                
                await loadLockData();
                
            } catch (error) {
                console.error('获取数据失败:', error);
            } finally {
                btn.classList.remove('spinning');
                isLoading = false;
            }
        }
        
        async function loadLockData() {
            try {
                const lockAddr = await mainContract.methods.lockContract().call();
                
                if (lockAddr && lockAddr !== '0x0000000000000000000000000000000000000000') {
                    lockContract = new web3.eth.Contract(LOCK_ABI, lockAddr);
                    
                    const lockInfo = await lockContract.methods.getAllLockInfo().call();
                    
                    const private30Total = lockInfo[0];
                    const private30Released = lockInfo[1];
                    const private40Total = lockInfo[2];
                    const private40Released = lockInfo[3];
                    const project30Total = lockInfo[5];
                    const project30Released = lockInfo[6];
                    const project40Total = lockInfo[7];
                    const project40Released = lockInfo[8];
                    
                    const privateLockTotal = BigInt(private30Total) + BigInt(private40Total);
                    const privateReleased = BigInt(private30Released) + BigInt(private40Released);
                    const projectLockTotal = BigInt(project30Total) + BigInt(project40Total);
                    const projectReleased = BigInt(project30Released) + BigInt(project40Released);
                    
                    document.getElementById('privateLockTotal').textContent = formatToken(privateLockTotal.toString());
                    document.getElementById('privateReleased').textContent = formatToken(privateReleased.toString());
                    document.getElementById('projectLockTotal').textContent = formatToken(projectLockTotal.toString());
                    document.getElementById('projectReleased').textContent = formatToken(projectReleased.toString());
                }
            } catch (error) {
                console.error('获取锁仓数据失败:', error);
            }
        }
        
        let lastClaimTime = 0;
        let lastRefreshTime = 0;
        
        async function loadDownlines() {
            if (!mainContract) return;
            
            try {
                const downlines = await mainContract.methods.downlines(account).call();
                
                if (downlines.length === 0) {
                    document.getElementById('downlineList').innerHTML = '<div style="text-align: center; padding: 20px; color: rgba(255,255,255,0.5);">暂无下级</div>';
                    return;
                }
                
                let html = '';
                const currentPhase = await mainContract.methods.currentPhase().call();
                const myHold = await mainContract.methods.getCurrentPhaseNetHold(account).call();
                
                for (const downline of downlines) {
                    const tierClaimed = await mainContract.methods.tierClaimed(account, downline, currentPhase).call();
                    const downHold = await mainContract.methods.getCurrentPhaseNetHold(downline).call();
                    
                    let status = 'inactive';
                    let statusText = '未达标';
                    
                    for (let tierId = 0; tierId < 3; tierId++) {
                        const tier = await mainContract.methods.phaseTiers(currentPhase, tierId).call();
                        if ((tierClaimed & (1 << tierId)) === 0) {
                            if (Number(downHold) >= Number(tier.downMin) && Number(myHold) >= Number(tier.upMin)) {
                                status = 'claimable';
                                statusText = '可领取';
                                break;
                            }
                        }
                    }
                    
                    if (status === 'inactive') {
                        if (tierClaimed === 7) {
                            status = 'claimed';
                            statusText = '已领完';
                        }
                    }
                    
                    html += `
                        <div class="downline-card">
                            <span class="downline-address">${downline.slice(0,6)}...${downline.slice(-4)}</span>
                            <span class="downline-badge ${status}">${statusText}</span>
                        </div>
                    `;
                }
                
                document.getElementById('downlineList').innerHTML = html;
            } catch (e) {
                console.error('加载下级列表失败:', e);
            }
        }
        
        async function refreshAllDownlines() {
            const COOLDOWN_HOURS = 24;
            const now = Date.now();
            
            if (lastRefreshTime > 0 && (now - lastRefreshTime) < (COOLDOWN_HOURS * 60 * 60 * 1000)) {
                const remaining = Math.ceil((lastRefreshTime + COOLDOWN_HOURS * 60 * 60 * 1000 - now) / (60 * 1000));
                showToast(`请等待 ${remaining} 分钟后再刷新`, 'error');
                return;
            }
            
            document.getElementById('claimLog').style.display = 'block';
            document.getElementById('logContent').innerHTML = '';
            
            addLog('开始一键刷新...', 'info');
            
            try {
                await loadDownlines();
                
                lastRefreshTime = Date.now();
                localStorage.setItem('xyl_last_refresh', lastRefreshTime.toString());
                document.getElementById('lastRefreshTime').textContent = `上次刷新: ${new Date(lastRefreshTime).toLocaleString('zh-CN')}`;
                
                addLog('✓ 刷新完成', 'success');
            } catch (e) {
                addLog(`✗ 刷新失败: ${e.message}`, 'error');
            }
        }
        
        async function autoClaimAll() {
            if (!mainContract) return;
            
            const COOLDOWN_HOURS = 24;
            const now = Date.now();
            
            if (lastClaimTime > 0 && (now - lastClaimTime) < (COOLDOWN_HOURS * 60 * 60 * 1000)) {
                const remaining = Math.ceil((lastClaimTime + COOLDOWN_HOURS * 60 * 60 * 1000 - now) / (60 * 1000));
                showToast(`请等待 ${remaining} 分钟后再领取`, 'error');
                return;
            }
            
            if (!confirm('确认要一键领取所有奖励吗？\n\n注意：\n- 每24小时只能领取一次\n- 将自动遍历所有下级\n- 可能需要多笔交易')) {
                return;
            }
            
            document.getElementById('claimLog').style.display = 'block';
            document.getElementById('logContent').innerHTML = '';
            
            try {
                const downlines = await mainContract.methods.downlines(account).call();
                
                if (downlines.length === 0) {
                    addLog('没有下级可领取', 'info');
                    return;
                }
                
                const currentPhase = await mainContract.methods.currentPhase().call();
                const myHold = await mainContract.methods.getCurrentPhaseNetHold(account).call();
                
                let successCount = 0;
                let failCount = 0;
                let claimableCount = 0;
                
                addLog('开始一键领取奖励...', 'info');
                addLog(`当前阶段: ${currentPhase}, 下级数量: ${downlines.length}`, 'info');
                
                for (const downline of downlines) {
                    const tierClaimed = await mainContract.methods.tierClaimed(account, downline, currentPhase).call();
                    const downHold = await mainContract.methods.getCurrentPhaseNetHold(downline).call();
                    
                    for (let tierId = 0; tierId < 3; tierId++) {
                        if ((tierClaimed & (1 << tierId)) !== 0) continue;
                        
                        const tier = await mainContract.methods.phaseTiers(currentPhase, tierId).call();
                        if (Number(downHold) < Number(tier.downMin) || Number(myHold) < Number(tier.upMin)) continue;
                        
                        claimableCount++;
                        addLog(`尝试领取 ${downline.slice(0,6)}...${downline.slice(-4)} 档${tierId + 1}`, 'info');
                        
                        try {
                            await mainContract.methods.claimReward(downline, tierId).send({ from: account });
                            addLog(`✓ 档${tierId + 1} 领取成功`, 'success');
                            successCount++;
                        } catch (e) {
                            const errMsg = e.message || '未知错误';
                            if (errMsg.includes('user rejected')) {
                                addLog('✗ 用户取消签名，领取终止', 'error');
                                return;
                            }
                            addLog(`✗ 档${tierId + 1} 失败: ${errMsg.slice(0,50)}`, 'error');
                            failCount++;
                        }
                        
                        await new Promise(r => setTimeout(r, 500));
                    }
                }
                
                if (claimableCount === 0) {
                    addLog('当前没有可领取的奖励', 'info');
                } else {
                    addLog(`完成！成功: ${successCount}, 失败: ${failCount}`, 'info');
                    lastClaimTime = Date.now();
                    localStorage.setItem('xyl_last_claim', lastClaimTime.toString());
                    document.getElementById('lastClaimTime').textContent = `上次领取: ${new Date(lastClaimTime).toLocaleString('zh-CN')}`;
                }
                
                loadDownlines();
                
            } catch (e) {
                addLog(`错误: ${e.message}`, 'error');
            }
        }
        
        function addLog(msg, type) {
            const logContent = document.getElementById('logContent');
            const div = document.createElement('div');
            div.className = `log-item log-${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logContent.appendChild(div);
            logContent.scrollTop = logContent.scrollHeight;
        }
        
        window.addEventListener('load', async () => {
            if (typeof window.ethereum !== 'undefined') {
                const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                if (accounts.length > 0) {
                    await connectWallet();
                }
            }
        });
    </script>

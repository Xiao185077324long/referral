<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYL Token 自动领取</title>
    <script src="https://cdn Web3Modal.com/web3modal@1.9.9/dist/index.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 30px 0; }
        .header h1 { font-size: 28px; margin-bottom: 10px; color: #f0b90b; }
        .card { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 24px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #f0b90b; }
        .btn { background: linear-gradient(135deg, #f0b90b 0%, #f7d06b 100%); color: #000; border: none; padding: 14px 28px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; width: 100%; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(240,185,11,0.3); }
        .btn:disabled { background: #555; color: #888; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; margin-top: 10px; }
        .status { padding: 12px; border-radius: 8px; margin-bottom: 16px; text-align: center; }
        .status.error { background: rgba(255,59,48,0.2); color: #ff6b6b; }
        .status.success { background: rgba(63,185,80,0.2); color: #6bff6b; }
        .status.info { background: rgba(0,122,255,0.2); color: #6bb3ff; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .info-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; }
        .info-label { font-size: 12px; color: #888; margin-bottom: 4px; }
        .info-value { font-size: 16px; font-weight: 600; }
        .downline-item { background: rgba(255,255,255,0.05); padding: 16px; border-radius: 8px; margin-bottom: 12px; border-left: 3px solid #f0b90b; }
        .downline-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .downline-address { font-family: monospace; font-size: 14px; color: #f0b90b; }
        .downline-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; font-size: 13px; }
        .tier-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
        .tier-0 { background: rgba(240,185,11,0.2); color: #f0b90b; }
        .tier-1 { background: rgba(0,122,255,0.2); color: #6bb3ff; }
        .tier-2 { background: rgba(63,185,80,0.2); color: #6bff6b; }
        .tier-claimed { background: rgba(255,59,48,0.2); color: #ff6b6b; }
        .btn-claim { background: linear-gradient(135deg, #3fb950 0%, #6bff6b 100%); color: #000; padding: 8px 16px; border-radius: 6px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }
        .btn-claim:disabled { background: #555; color: #888; cursor: not-allowed; }
        .progress-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin-top: 8px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #f0b90b, #f7d06b); transition: width 0.3s; }
        .loading { text-align: center; padding: 20px; color: #888; }
        .empty { text-align: center; padding: 40px; color: #888; }
        .log-container { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 12px; max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px; margin-top: 16px; }
        .log-item { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .log-success { color: #6bff6b; }
        .log-error { color: #ff6b6b; }
        .log-info { color: #6bb3ff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐉 XYL 自动领取</h1>
            <p style="color: #888;">一键领取所有下级推广奖励</p>
        </div>

        <div id="statusBox" class="status info" style="display:none;"></div>

        <div class="card">
            <div class="card-title">钱包连接</div>
            <button id="btnConnect" class="btn" onclick="connectWallet()">连接钱包</button>
            <div id="walletInfo" style="margin-top: 16px; display: none;">
                <div class="info-item">
                    <div class="info-label">当前钱包</div>
                    <div id="walletAddress" class="info-value" style="font-family: monospace;"></div>
                </div>
            </div>
        </div>

        <div id="mainPanel" style="display: none;">
            <div class="card">
                <div class="card-title">我的下级列表</div>
                <button id="btnRefresh" class="btn btn-secondary" onclick="loadDownlines()">刷新下级数据</button>
                <div id="downlineStats" class="info-grid" style="margin-top: 16px;"></div>
                <div id="downlineList" style="margin-top: 16px;"></div>
            </div>

            <div class="card">
                <div class="card-title">自动领取</div>
                <div id="claimInfo" class="info-grid"></div>
                <button id="btnClaimAll" class="btn" style="margin-top: 16px;" onclick="claimAllRewards()" disabled>一键领取所有可用奖励</button>
                <div class="log-container" id="claimLog" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script>
        let web3Modal;
        let provider;
        let accounts;
        let contract;
        let currentAccount;
        let chainId = 56;

        const CONTRACT_ABI = [
            {"inputs":[],"name":"downlines","outputs":[{"internalType":"address[]","name":"","type":"address[]"}],"stateMutability":"view","type":"function"},
            {"inputs":[{"internalType":"address","name":"_downline","type":"address"},{"internalType":"uint8","name":"tierId","type":"uint8"}],"name":"claimReward","outputs":[],"stateMutability":"nonpayable","type":"function"},
            {"inputs":[{"internalType":"address","name":"user","type":"address"}],"name":"getCurrentPhaseNetHold","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
            {"inputs":[],"name":"currentPhase","outputs":[{"internalType":"uint8","name":"","type":"uint8"}],"stateMutability":"view","type":"function"},
            {"inputs":[{"internalType":"address","name":"","type":"address"},{"internalType":"address","name":"","type":"address"},{"internalType":"uint8","name":"","type":"uint8"}],"name":"tierClaimed","outputs":[{"internalType":"uint8","name":"","type":"uint8"}],"stateMutability":"view","type":"function"},
            {"inputs":[{"internalType":"uint8","name":"","type":"uint8"},{"internalType":"uint8","name":"","type":"uint8"}],"name":"phaseTiers","outputs":[{"internalType":"uint256","name":"upMin","type":"uint256"},{"internalType":"uint256","name":"downMin","type":"uint256"}],"stateMutability":"view","type":"function"},
            {"inputs":[],"name":"HOLD_LOCK_PERIOD","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
            {"inputs":[{"internalType":"address","name":"user","type":"address"}],"name":"holdTimerStart","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
            {"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"referrer","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},
            {"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"phaseConfigs","outputs":[{"internalType":"uint256","name":"rewardPercent","type":"uint256"}],"stateMutability":"view","type":"function"},
            {"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"downlineClaimed","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
        ];

        let CONTRACT_ADDRESS = "";

        async function init() {
            try {
                const response = await fetch('config.json');
                const config = await response.json();
                CONTRACT_ADDRESS = config.contractAddress;
            } catch (e) {
                showStatus('请先配置合约地址 (config.json)', 'error');
            }
        }

        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    currentAccount = accounts[0];
                    web3Modal = new Web3Modal();
                    provider = await web3Modal.connect();
                    const web3 = new Web3(provider);
                    contract = new web3.eth.Contract(CONTRACT_ABI, CONTRACT_ADDRESS);

                    document.getElementById('btnConnect').style.display = 'none';
                    document.getElementById('walletInfo').style.display = 'block';
                    document.getElementById('walletAddress').textContent = currentAccount;
                    document.getElementById('mainPanel').style.display = 'block';

                    loadDownlines();

                    provider.on('accountsChanged', (accounts) => {
                        window.location.reload();
                    });
                    provider.on('chainChanged', () => {
                        window.location.reload();
                    });
                } catch (e) {
                    showStatus('连接失败: ' + e.message, 'error');
                }
            } else {
                showStatus('请安装 MetaMask 钱包', 'error');
            }
        }

        async function loadDownlines() {
            if (!contract || !currentAccount) return;

            showStatus('加载中...', 'info');
            const btn = document.getElementById('btnRefresh');
            btn.disabled = true;
            btn.textContent = '加载中...';

            try {
                const downlines = await contract.methods.downlines(currentAccount).call();

                document.getElementById('downlineStats').innerHTML = `
                    <div class="info-item">
                        <div class="info-label">下级总数</div>
                        <div class="info-value">${downlines.length}</div>
                    </div>
                `;

                if (downlines.length === 0) {
                    document.getElementById('downlineList').innerHTML = '<div class="empty">暂无下级数据</div>';
                    document.getElementById('btnClaimAll').disabled = true;
                } else {
                    let html = '';
                    let claimableCount = 0;

                    for (let i = 0; i < downlines.length; i++) {
                        const downline = downlines[i];
                        const downlineInfo = await getDownlineInfo(downline, i);
                        html += downlineInfo.html;
                        claimableCount += downlineInfo.claimableCount;
                    }

                    document.getElementById('downlineList').innerHTML = html;

                    const btnClaimAll = document.getElementById('btnClaimAll');
                    btnClaimAll.disabled = claimableCount === 0;
                    btnClaimAll.textContent = claimableCount > 0 ? `一键领取 (${claimableCount}个可领取)` : '暂无可领取奖励';
                }

                showStatus('加载完成', 'success');
            } catch (e) {
                showStatus('加载失败: ' + e.message, 'error');
            }

            btn.disabled = false;
            btn.textContent = '刷新下级数据';
        }

        async function getDownlineInfo(addr, index) {
            const web3 = new Web3(provider);
            let html = '';
            let claimableCount = 0;

            try {
                const netHold = await contract.methods.getCurrentPhaseNetHold(addr).call();
                const myNetHold = await contract.methods.getCurrentPhaseNetHold(currentAccount).call();
                const currentPhase = await contract.methods.currentPhase().call();
                const tierConfig0 = await contract.methods.phaseTiers(currentPhase, 0).call();
                const tierConfig1 = await contract.methods.phaseTiers(currentPhase, 1).call();
                const tierConfig2 = await contract.methods.phaseTiers(currentPhase, 2).call();

                const holdDisplay = (Number(web3.utils.fromWei(netHold)) / 10000).toFixed(2) + '万';
                const hold0 = Number(web3.utils.fromWei(tierConfig0.downMin)) / 10000;
                const hold1 = Number(web3.utils.fromWei(tierConfig1.downMin)) / 10000;
                const hold2 = Number(web3.utils.fromWei(tierConfig2.downMin)) / 10000;

                html = `
                    <div class="downline-item">
                        <div class="downline-header">
                            <span class="downline-address">${addr}</span>
                            <span style="color:#888;font-size:12px;">净持仓: ${holdDisplay}</span>
                        </div>
                        <div class="downline-stats">
                `;

                const bitmap = await contract.methods.tierClaimed(currentAccount, addr, currentPhase).call();
                const tier0Claimed = (bitmap & 1) !== 0;
                const tier1Claimed = (bitmap & 2) !== 0;
                const tier2Claimed = (bitmap & 4) !== 0;

                const tier0Eligible = Number(netHold) >= Number(tierConfig0.downMin) && Number(myNetHold) >= Number(tierConfig0.upMin);
                const tier1Eligible = Number(netHold) >= Number(tierConfig1.downMin) && Number(myNetHold) >= Number(tierConfig1.upMin);
                const tier2Eligible = Number(netHold) >= Number(tierConfig2.downMin) && Number(myNetHold) >= Number(tierConfig2.upMin);

                html += createTierBadge(0, tier0Claimed, tier0Eligible, hold0);
                html += createTierBadge(1, tier1Claimed, tier1Eligible, hold1);
                html += createTierBadge(2, tier2Claimed, tier2Eligible, hold2);

                html += `
                        </div>
                    </div>
                `;

                if (tier0Eligible && !tier0Claimed) claimableCount++;
                if (tier1Eligible && !tier1Claimed) claimableCount++;
                if (tier2Eligible && !tier2Claimed) claimableCount++;

            } catch (e) {
                html = `
                    <div class="downline-item">
                        <div class="downline-header">
                            <span class="downline-address">${addr}</span>
                        </div>
                        <div style="color:#ff6b6b;font-size:12px;">加载失败</div>
                    </div>
                `;
            }

            return { html, claimableCount };
        }

        function createTierBadge(tierId, claimed, eligible, threshold) {
            let badge = '';
            let btn = '';

            if (claimed) {
                badge = `<span class="tier-badge tier-claimed">档${tierId + 1} 已领 (${threshold}万门槛)</span>`;
            } else if (eligible) {
                badge = `<span class="tier-badge tier-${tierId}">档${tierId + 1} 可领 (${threshold}万门槛)</span>`;
                btn = `<button class="btn-claim" onclick="claimSingle('${String(tierId).slice(0)}')">领取</button>`;
            } else {
                badge = `<span class="tier-badge" style="background:rgba(100,100,100,0.2);color:#888;">档${tierId + 1} 未达标 (${threshold}万门槛)</span>`;
            }

            return `
                <div style="display:flex;align-items:center;gap:8px;">
                    ${badge}
                    ${btn}
                </div>
            `;
        }

        async function claimAllRewards() {
            if (!contract || !currentAccount) return;

            const logBox = document.getElementById('claimLog');
            logBox.style.display = 'block';
            logBox.innerHTML = '';

            const btn = document.getElementById('btnClaimAll');
            btn.disabled = true;
            btn.textContent = '领取中...';

            const downlines = await contract.methods.downlines(currentAccount).call();
            const currentPhase = await contract.methods.currentPhase().call();
            const myNetHold = await contract.methods.getCurrentPhaseNetHold(currentAccount).call();

            let successCount = 0;
            let failCount = 0;

            for (let i = 0; i < downlines.length; i++) {
                const downline = downlines[i];
                const netHold = await contract.methods.getCurrentPhaseNetHold(downline).call();
                const bitmap = await contract.methods.tierClaimed(currentAccount, downline, currentPhase).call();

                for (let tierId = 0; tierId < 3; tierId++) {
                    const tierConfig = await contract.methods.phaseTiers(currentPhase, tierId).call();
                    const tierClaimed = (bitmap & (1 << tierId)) !== 0;
                    const eligible = Number(netHold) >= Number(tierConfig.downMin) && Number(myNetHold) >= Number(tierConfig.upMin);

                    if (!tierClaimed && eligible) {
                        addLog(`尝试领取 档${tierId + 1} 下级 ${downline.slice(0, 8)}...${downline.slice(-6)}`, 'info');

                        try {
                            await contract.methods.claimReward(downline, tierId).send({ from: currentAccount });
                            addLog(`✓ 档${tierId + 1} 领取成功`, 'success');
                            successCount++;
                        } catch (e) {
                            addLog(`✗ 档${tierId + 1} 失败: ${e.message.slice(0, 50)}`, 'error');
                            failCount++;
                        }

                        await new Promise(r => setTimeout(r, 500));
                    }
                }
            }

            addLog(`完成: 成功 ${successCount} 个, 失败 ${failCount} 个`, 'info');

            btn.disabled = false;
            btn.textContent = '一键领取所有可用奖励';

            setTimeout(() => {
                loadDownlines();
            }, 2000);
        }

        async function claimSingle(tierId) {
            const downline = event.target.closest('.downline-item').querySelector('.downline-address').textContent.trim();
            const addr = await getDownlineAddressFromDisplay(downline);

            if (!addr) {
                addLog('无法解析地址', 'error');
                return;
            }

            const logBox = document.getElementById('claimLog');
            logBox.style.display = 'block';

            addLog(`领取 档${parseInt(tierId) + 1} 下级 ${addr.slice(0, 8)}...${addr.slice(-6)}`, 'info');

            try {
                await contract.methods.claimReward(addr, parseInt(tierId)).send({ from: currentAccount });
                addLog(`✓ 领取成功`, 'success');
                setTimeout(() => loadDownlines(), 1500);
            } catch (e) {
                addLog(`✗ 失败: ${e.message.slice(0, 80)}`, 'error');
            }
        }

        async function getDownlineAddressFromDisplay(display) {
            const downlines = await contract.methods.downlines(currentAccount).call();
            for (const d of downlines) {
                if (display.startsWith(d.slice(0, 8))) {
                    return d;
                }
            }
            return null;
        }

        function addLog(msg, type) {
            const logBox = document.getElementById('claimLog');
            const div = document.createElement('div');
            div.className = `log-item log-${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logBox.appendChild(div);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function showStatus(msg, type) {
            const box = document.getElementById('statusBox');
            box.style.display = 'block';
            box.className = `status ${type}`;
            box.textContent = msg;
        }

        window.addEventListener('load', init);
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/web3/1.7.3/web3.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUB 推广绑定</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.7.2.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
        }
        .wallet-info {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .wallet-label {
            color: #666;
            font-size: 12px;
            margin-bottom: 5px;
        }
        .wallet-address {
            color: #333;
            font-size: 14px;
            word-break: break-all;
            font-family: monospace;
        }
        .qr-container {
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: #fff;
            border-radius: 12px;
            border: 2px dashed #ddd;
        }
        #qrcode {
            margin: 0 auto;
        }
        canvas {
            display: block;
            margin: 0 auto;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #f0b90b;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f0b90b 0%, #f7d774 100%);
            color: #000;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(240, 185, 11, 0.3);
        }
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }
        .btn-secondary:hover {
            background: #d0d0d0;
        }
        .message {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            display: block;
        }
        .status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .status-label {
            color: #666;
            font-size: 12px;
        }
        .status-value {
            color: #333;
            font-size: 14px;
            font-weight: 500;
        }
        .status-value.connected {
            color: #28a745;
        }
        .status-value.disconnected {
            color: #dc3545;
        }
        .referrer-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .copy-btn {
            background: #f0b90b;
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 10px;
        }
        .copy-btn:hover {
            background: #e5a800;
        }
        .tips {
            background: #fffbeb;
            border: 1px solid #fcd34d;
            border-radius: 8px;
            padding: 12px;
            margin-top: 20px;
            font-size: 12px;
            color: #92400e;
        }
        .tips strong {
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🔗</div>
            <h1>GUB 推广绑定</h1>
            <p class="subtitle">绑定您的上级推广人</p>
        </div>

        <div class="status">
            <span class="status-label">钱包状态</span>
            <span id="walletStatus" class="status-value disconnected">未连接</span>
        </div>

        <div class="wallet-info">
            <div class="wallet-label">我的钱包地址</div>
            <div id="myAddress" class="wallet-address">连接钱包后显示</div>
            <button class="copy-btn" id="copyMyAddress" style="display:none;">复制地址</button>
        </div>

        <div class="qr-container">
            <div id="qrcode"></div>
            <p style="margin-top: 10px; font-size: 12px; color: #666;">扫码分享您的钱包地址</p>
        </div>

        <div class="referrer-section">
            <div class="input-group">
                <label>输入上级推广人地址（选填）</label>
                <input type="text" id="referrerInput" placeholder="0x..." />
            </div>
            <button class="btn btn-primary" id="bindBtn" disabled>绑定推广关系</button>
        </div>

        <div id="message" class="message"></div>

        <div class="tips">
            <strong>📌 绑定说明</strong>
            1. 请先连接钱包<br>
            2. 分享您的地址给下级，或输入上级的地址<br>
            3. <strong>必须在首次购买前绑定，绑定后不可更改</strong>
        </div>
    </div>

    <script>
        // ============ 配置区 - 请修改这里 ============
        const CONFIG = {
            // 代币合约地址（请修改为您的合约地址）
            TOKEN_ADDRESS: "YOUR_TOKEN_CONTRACT_ADDRESS",
            // RPC节点（BSC主网）
            RPC_URL: "https://bsc-dataseed.binance.org/",
            // Chain ID (56 = BSC Mainnet, 97 = BSC Testnet)
            CHAIN_ID: 56
        };
        // ============================================

        let signer = null;
        let address = null;

        // ABI - 只包含需要的函数
        const ABI = [
            "function bindReferrer(address refAddr) external",
            "function referrer(address user) external view returns (address)",
            "function userFirstBuyTime(address user) external view returns (uint256)"
        ];

        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    signer = provider.getSigner();
                    address = await signer.getAddress();

                    document.getElementById('walletStatus').textContent = '已连接';
                    document.getElementById('walletStatus').className = 'status-value connected';
                    document.getElementById('myAddress').textContent = address;
                    document.getElementById('copyMyAddress').style.display = 'block';
                    document.getElementById('bindBtn').disabled = false;

                    // 生成二维码
                    generateQR(address);

                    // 检查是否已绑定
                    await checkReferrer();

                } catch (err) {
                    showMessage('连接钱包失败: ' + err.message, 'error');
                }
            } else {
                showMessage('请安装 MetaMask 或其他 Web3 钱包', 'error');
            }
        }

        function generateQR(text) {
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';
            QRCode.toCanvas(address, {
                width: 200,
                margin: 2,
                color: {
                    dark: '#000000',
                    light: '#ffffff'
                }
            }, function(error, canvas) {
                if (error) {
                    console.error(error);
                    return;
                }
                qrContainer.appendChild(canvas);
            });
        }

        async function checkReferrer() {
            try {
                const provider = new ethers.providers.JsonRpcProvider(CONFIG.RPC_URL);
                const contract = new ethers.Contract(CONFIG.TOKEN_ADDRESS, ABI, provider);
                
                const myReferrer = await contract.referrer(address);
                const firstBuyTime = await contract.userFirstBuyTime(address);
                
                if (myReferrer !== "0x0000000000000000000000000000000000000000") {
                    showMessage('您已绑定推广人: ' + myReferrer, 'info');
                    document.getElementById('referrerInput').disabled = true;
                    document.getElementById('bindBtn').disabled = true;
                } else if (Number(firstBuyTime) > 0) {
                    showMessage('您已完成首次购买，无法再绑定推广人', 'error');
                    document.getElementById('referrerInput').disabled = true;
                    document.getElementById('bindBtn').disabled = true;
                }
            } catch (err) {
                console.error('检查推广关系失败:', err);
            }
        }

        async function bindReferrer() {
            const referrerAddr = document.getElementById('referrerInput').value.trim();
            
            if (!referrerAddr) {
                showMessage('请输入上级推广人地址', 'error');
                return;
            }

            if (!ethers.utils.isAddress(referrerAddr)) {
                showMessage('请输入有效的钱包地址', 'error');
                return;
            }

            if (referrerAddr.toLowerCase() === address.toLowerCase()) {
                showMessage('不能绑定自己为上级', 'error');
                return;
            }

            const btn = document.getElementById('bindBtn');
            btn.disabled = true;
            btn.textContent = '绑定中...';

            try {
                const contract = new ethers.Contract(CONFIG.TOKEN_ADDRESS, ABI, signer);
                const tx = await contract.bindReferrer(referrerAddr);
                await tx.wait();
                
                showMessage('绑定成功！推广关系已建立', 'success');
                document.getElementById('referrerInput').disabled = true;
            } catch (err) {
                console.error('绑定失败:', err);
                if (err.message.includes('already bound')) {
                    showMessage('您已经绑定过推广人了', 'error');
                } else if (err.message.includes('Cannot bind after first buy')) {
                    showMessage('您已完成首次购买，无法再绑定', 'error');
                } else {
                    showMessage('绑定失败: ' + err.message, 'error');
                }
            }

            btn.disabled = false;
            btn.textContent = '绑定推广关系';
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
        }

        function copyAddress() {
            navigator.clipboard.writeText(address).then(() => {
                showMessage('地址已复制', 'info');
            });
        }

        // 事件监听
        document.getElementById('walletStatus').addEventListener('click', connectWallet);
        document.getElementById('bindBtn').addEventListener('click', bindReferrer);
        document.getElementById('copyMyAddress').addEventListener('click', copyAddress);

        // 自动连接（如果之前已授权）
        if (typeof window.ethereum !== 'undefined') {
            window.ethereum.request({ method: 'eth_accounts' }).then(accounts => {
                if (accounts.length > 0) {
                    connectWallet();
                }
            });
        }
    </script>
</body>
</html>
